    <text x="100" y="468" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#0F172A">Enable Footer</text>
    <text x="100" y="482" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Add unsubscribe link to message</text>
    <rect x="468" y="461" width="34" height="18" rx="9" fill="#16A34A"/>
    <circle cx="493" cy="470" r="6.5" fill="#fff"/>
    <!-- CTA -->
    <rect x="358" y="506" width="158" height="34" rx="8" fill="#dc2727"/>
    <text x="437" y="527" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#fff">Next: Review &amp; Send &#8594;</text>
    <!-- Phone preview -->
    <rect x="560" y="180" width="244" height="370" rx="10" fill="#FAFBFC" filter="url(#card-shadow-sm)" stroke="#E2E8F0" stroke-width="1"/>
    <text x="576" y="202" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Message Preview</text>
    <text x="576" y="216" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">See how your SMS will appear</text>
    <!-- Mini phone -->
    <rect x="622" y="230" width="140" height="280" rx="18" fill="#131521"/>
    <rect x="628" y="244" width="128" height="252" rx="2" fill="#ECE5DD"/>
    <rect x="628" y="244" width="128" height="34" rx="2" fill="#075E54"/>
    <text x="648" y="266" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#fff">Kaptea</text>
    <!-- Bubble -->
    <rect x="636" y="286" width="112" height="96" rx="8" fill="#fff"/>
    <text x="644" y="300" font-family="Arial, sans-serif" font-size="7.5" fill="#333">Thanks for your order!</text>
    <text x="644" y="312" font-family="Arial, sans-serif" font-size="7.5" fill="#333">Order #ORD-4829 with</text>
    <text x="644" y="324" font-family="Arial, sans-serif" font-size="7.5" fill="#333">Depot 2 is confirmed.</text>
    <text x="644" y="340" font-family="Arial, sans-serif" font-size="7.5" fill="#333">We'll text you when</text>
    <text x="644" y="352" font-family="Arial, sans-serif" font-size="7.5" fill="#333">it ships.</text>
    <text x="644" y="372" font-family="Arial, sans-serif" font-size="7" fill="#999">Txt STOP to opt out.</text>
    <text x="720" y="378" font-family="Arial, sans-serif" font-size="6" fill="#999">Now</text>
    <!-- Pro Tips -->
    <rect x="560" y="562" width="244" height="72" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
    <text x="576" y="580" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#B45309">Pro Tips</text>
    <text x="576" y="596" font-family="Arial, sans-serif" font-size="8" fill="#78716C">Keep under 160 chars to minimize costs</text>
    <text x="576" y="610" font-family="Arial, sans-serif" font-size="8" fill="#78716C">Test on your own number before sending</text>
    <text x="576" y="624" font-family="Arial, sans-serif" font-size="8" fill="#78716C">Personalize with contact variables</text>

  </g>
</svg>