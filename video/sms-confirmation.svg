<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220" font-family="Inter, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- Kaptea hero-video 'promise kept' conversation. Transparent outside the card;
       card itself is translucent (frosted glass). Export to PNG with alpha for compositing. -->
  <defs>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="135%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <clipPath id="iconClip"><rect x="26" y="22" width="44" height="44" rx="13"/></clipPath>
  </defs>

  <!-- translucent glass card -->
  <rect x="10" y="8" width="540" height="204" rx="26" fill="#10121e" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.3" filter="url(#sh)"/>

  <!-- app icon: white tile + red Kaptea mark -->
  <g clip-path="url(#iconClip)">
    <rect x="26" y="22" width="44" height="44" fill="#ffffff"/>
    <g transform="translate(26,22) scale(0.345) translate(-7,-3)" fill="#dc2727">
      <path d="M117.26,41.13c-.86-2.62-1.82-5-2.87-7.21l-31.1,34.32,32.25,34.74c6.8-18.38,7.66-43.8,1.72-61.85Z"/>
      <path d="M58.11,64.78l42.46-47.31c-12.51-7.64-28.45-4.35-42.46,4.28v43.03Z"/>
      <path d="M58.11,73.7v41.64c13.73,8.78,28.68,13.27,38.53,10.16,2.33-.74,4.5-1.95,6.51-3.53l-45.04-48.27Z"/>
      <path d="M40.82,36.2c-11.44,12.63-18.29,28.21-14.7,40.7,2.46,8.61,7.84,16.91,14.7,24.18V36.2Z"/>
    </g>
  </g>
  <text x="84" y="49" font-size="16" font-weight="700" fill="#ffffff">Kaptea<tspan font-size="12.5" font-weight="400" fill="#b0b6c4"> &#183; now</tspan></text>

  <!-- incoming (Kaptea) bubble + teal check -->
  <rect x="26" y="78" width="386" height="52" rx="18" fill="#f5f6f9" fill-opacity="0.97"/>
  <text x="44" y="110" font-size="15" fill="#131521">All sorted, confirmed for Tuesday 9am</text>
  <rect x="366" y="89" width="30" height="30" rx="9" fill="#3fd0c0"/>
  <path d="M373 104 l6 7 l10 -12" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- outgoing (customer) bubble -->
  <rect x="246" y="140" width="288" height="52" rx="18" fill="#3fd0c0"/>
  <text x="516" y="172" font-size="15" fill="#0c201c" text-anchor="end">Perfect, see you Tuesday at 9am</text>
</svg>
