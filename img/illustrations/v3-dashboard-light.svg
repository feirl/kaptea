<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <filter id="card-shadow" x="-6%" y="-4%" width="112%" height="116%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="card-shadow-sm" x="-8%" y="-6%" width="116%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Transparent background - no rect fill -->

  <!-- ====== FLOATING KPI CARDS (tilted slightly for depth) ====== -->

  <!-- Card 1: Messages -->
  <g transform="translate(40, 50) rotate(-2, 100, 55)">
    <rect width="200" height="110" rx="14" fill="#fff" filter="url(#card-shadow)"/>
    <!-- Accent top border -->
    <rect width="200" height="3" rx="1.5" fill="#D32F2F" y="0" opacity="0.7"/>
    <!-- Icon circle -->
    <circle cx="30" cy="34" r="16" fill="#D32F2F" opacity="0.08"/>
    <text x="30" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#D32F2F">&#9993;</text>
    <text x="54" y="30" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Messages &amp; Calls</text>
    <text x="54" y="42" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#16A34A">&#9650; 14.2%</text>
    <text x="20" y="76" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0F172A">48,483</text>
    <!-- Sparkline -->
    <polyline points="20,97 40,94 60,90 80,92 100,86 120,88 140,80 160,82 180,74" fill="none" stroke="#D32F2F" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <polyline points="20,97 40,94 60,90 80,92 100,86 120,88 140,80 160,82 180,74 180,102 20,102" fill="#D32F2F" opacity="0.05"/>
  </g>

  <!-- Card 2: Delivery Rate -->
  <g transform="translate(270, 30) rotate(1, 100, 55)">
    <rect width="200" height="110" rx="14" fill="#fff" filter="url(#card-shadow)"/>
    <rect width="200" height="3" rx="1.5" fill="#16A34A" y="0" opacity="0.7"/>
    <circle cx="30" cy="34" r="16" fill="#16A34A" opacity="0.08"/>
    <circle cx="30" cy="34" r="10" fill="none" stroke="#E2E8F0" stroke-width="3"/>
    <circle cx="30" cy="34" r="10" fill="none" stroke="#16A34A" stroke-width="3" stroke-dasharray="61 63" stroke-linecap="round" transform="rotate(-90 30 34)"/>
    <text x="54" y="30" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Delivery Rate</text>
    <text x="54" y="42" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#16A34A">&#9650; 0.3%</text>
    <text x="20" y="76" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0F172A">99.1%</text>
    <polyline points="20,97 40,96 60,97 80,96 100,97 120,96 140,97 160,96 180,97" fill="none" stroke="#16A34A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Card 3: Engagement -->
  <g transform="translate(520, 55) rotate(-1.5, 100, 55)">
    <rect width="200" height="110" rx="14" fill="#fff" filter="url(#card-shadow)"/>
    <rect width="200" height="3" rx="1.5" fill="#F59E0B" y="0" opacity="0.7"/>
    <circle cx="30" cy="34" r="16" fill="#F59E0B" opacity="0.08"/>
    <circle cx="30" cy="34" r="10" fill="none" stroke="#E2E8F0" stroke-width="3"/>
    <circle cx="30" cy="34" r="10" fill="none" stroke="#F59E0B" stroke-width="3" stroke-dasharray="49 63" stroke-linecap="round" transform="rotate(-90 30 34)"/>
    <text x="54" y="30" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Engagement Rate</text>
    <text x="54" y="42" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#16A34A">&#9650; 5.8%</text>
    <text x="20" y="76" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0F172A">78.2%</text>
    <polyline points="20,97 40,92 60,94 80,88 100,90 120,84 140,86 160,80 180,78" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- ====== CENTRAL DONUT CHART ====== -->
  <g transform="translate(140, 230)" filter="url(#card-shadow)">
    <rect width="300" height="310" rx="18" fill="#fff"/>

    <text x="24" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0F172A">Channel Distribution</text>

    <!-- Donut -->
    <g transform="translate(150, 160)">
      <circle cx="0" cy="0" r="85" fill="none" stroke="#F1F5F9" stroke-width="24"/>
      <!-- WhatsApp 17.7% -->
      <circle cx="0" cy="0" r="85" fill="none" stroke="#25D366" stroke-width="24" stroke-dasharray="94.5 439.5" stroke-dashoffset="134" stroke-linecap="butt"/>
      <!-- SMS 26.5% -->
      <circle cx="0" cy="0" r="85" fill="none" stroke="#4A90D9" stroke-width="24" stroke-dasharray="141.5 392.5" stroke-dashoffset="39.5" stroke-linecap="butt"/>
      <!-- Chat 13.5% -->
      <circle cx="0" cy="0" r="85" fill="none" stroke="#A855F7" stroke-width="24" stroke-dasharray="72 462" stroke-dashoffset="-102" stroke-linecap="butt"/>
      <!-- RCS 3.9% -->
      <circle cx="0" cy="0" r="85" fill="none" stroke="#F59E0B" stroke-width="24" stroke-dasharray="21 513" stroke-dashoffset="-174" stroke-linecap="butt"/>
      <!-- Email 31.4% -->
      <circle cx="0" cy="0" r="85" fill="none" stroke="#14B8A6" stroke-width="24" stroke-dasharray="168 366" stroke-dashoffset="-195" stroke-linecap="butt"/>
      <!-- Voice 7% -->
      <circle cx="0" cy="0" r="85" fill="none" stroke="#EF4444" stroke-width="24" stroke-dasharray="37.5 496.5" stroke-dashoffset="-363" stroke-linecap="butt"/>

      <!-- Center -->
      <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0F172A">48,483</text>
      <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Total Messages</text>
    </g>

    <!-- Legend -->
    <g transform="translate(24, 268)">
      <circle cx="0" cy="0" r="4" fill="#25D366"/>
      <text x="10" y="3" font-family="Arial, sans-serif" font-size="10" fill="#64748B">WhatsApp</text>
      <circle cx="90" cy="0" r="4" fill="#4A90D9"/>
      <text x="100" y="3" font-family="Arial, sans-serif" font-size="10" fill="#64748B">SMS</text>
      <circle cx="140" cy="0" r="4" fill="#A855F7"/>
      <text x="150" y="3" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Chat</text>
      <circle cx="0" cy="22" r="4" fill="#F59E0B"/>
      <text x="10" y="25" font-family="Arial, sans-serif" font-size="10" fill="#64748B">RCS</text>
      <circle cx="55" cy="22" r="4" fill="#14B8A6"/>
      <text x="65" y="25" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Email</text>
      <circle cx="120" cy="22" r="4" fill="#EF4444"/>
      <text x="130" y="25" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Voice</text>
    </g>
  </g>

  <!-- ====== STACKED BAR CHART (floating right) ====== -->
  <g transform="translate(475, 200)" filter="url(#card-shadow)">
    <rect width="290" height="340" rx="18" fill="#fff"/>

    <text x="24" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0F172A">Message Volume</text>
    <text x="24" y="46" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">Last 24 hours by channel</text>

    <!-- Y axis labels -->
    <text x="24" y="80" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">7k</text>
    <text x="24" y="130" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">5k</text>
    <text x="24" y="180" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">3k</text>
    <text x="24" y="230" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">1k</text>
    <text x="24" y="270" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">0</text>

    <!-- Grid lines -->
    <line x1="44" y1="76" x2="270" y2="76" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="44" y1="126" x2="270" y2="126" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="44" y1="176" x2="270" y2="176" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="44" y1="226" x2="270" y2="226" stroke="#F1F5F9" stroke-width="1"/>
    <line x1="44" y1="266" x2="270" y2="266" stroke="#F1F5F9" stroke-width="1"/>

    <!-- Stacked bars -->
    <!-- 06:00 -->
    <rect x="54" y="208" width="24" height="58" fill="#25D366"/>
    <rect x="54" y="176" width="24" height="32" fill="#4A90D9"/>
    <rect x="54" y="156" width="24" height="20" fill="#A855F7"/>
    <rect x="54" y="140" width="24" height="16" fill="#14B8A6"/>
    <rect x="54" y="130" width="24" height="10" rx="2" fill="#EF4444"/>

    <!-- 09:00 -->
    <rect x="88" y="184" width="24" height="82" fill="#25D366"/>
    <rect x="88" y="144" width="24" height="40" fill="#4A90D9"/>
    <rect x="88" y="118" width="24" height="26" fill="#A855F7"/>
    <rect x="88" y="98" width="24" height="20" fill="#14B8A6"/>
    <rect x="88" y="86" width="24" height="12" rx="2" fill="#EF4444"/>

    <!-- 12:00 (peak) -->
    <rect x="122" y="166" width="24" height="100" fill="#25D366"/>
    <rect x="122" y="118" width="24" height="48" fill="#4A90D9"/>
    <rect x="122" y="88" width="24" height="30" fill="#A855F7"/>
    <rect x="122" y="66" width="24" height="22" fill="#14B8A6"/>
    <rect x="122" y="54" width="24" height="12" rx="2" fill="#EF4444"/>

    <!-- 15:00 -->
    <rect x="156" y="176" width="24" height="90" fill="#25D366"/>
    <rect x="156" y="132" width="24" height="44" fill="#4A90D9"/>
    <rect x="156" y="106" width="24" height="26" fill="#A855F7"/>
    <rect x="156" y="86" width="24" height="20" fill="#14B8A6"/>
    <rect x="156" y="76" width="24" height="10" rx="2" fill="#EF4444"/>

    <!-- 18:00 -->
    <rect x="190" y="194" width="24" height="72" fill="#25D366"/>
    <rect x="190" y="154" width="24" height="40" fill="#4A90D9"/>
    <rect x="190" y="132" width="24" height="22" fill="#A855F7"/>
    <rect x="190" y="116" width="24" height="16" fill="#14B8A6"/>
    <rect x="190" y="106" width="24" height="10" rx="2" fill="#EF4444"/>

    <!-- 21:00 -->
    <rect x="224" y="218" width="24" height="48" fill="#25D366"/>
    <rect x="224" y="190" width="24" height="28" fill="#4A90D9"/>
    <rect x="224" y="174" width="24" height="16" fill="#A855F7"/>
    <rect x="224" y="162" width="24" height="12" fill="#14B8A6"/>
    <rect x="224" y="154" width="24" height="8" rx="2" fill="#EF4444"/>

    <!-- X axis labels -->
    <text x="66" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">06</text>
    <text x="100" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">09</text>
    <text x="134" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0F172A" font-weight="600">12</text>
    <text x="168" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">15</text>
    <text x="202" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">18</text>
    <text x="236" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">21</text>

    <!-- Peak indicator -->
    <line x1="134" y1="50" x2="134" y2="54" stroke="#F59E0B" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="134" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#F59E0B">Peak</text>

    <!-- Mini legend -->
    <g transform="translate(24, 306)">
      <circle cx="0" cy="0" r="3" fill="#25D366"/>
      <text x="8" y="3" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">WhatsApp</text>
      <circle cx="65" cy="0" r="3" fill="#4A90D9"/>
      <text x="73" y="3" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">SMS</text>
      <circle cx="100" cy="0" r="3" fill="#A855F7"/>
      <text x="108" y="3" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Chat</text>
      <circle cx="140" cy="0" r="3" fill="#14B8A6"/>
      <text x="148" y="3" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Email</text>
      <circle cx="185" cy="0" r="3" fill="#EF4444"/>
      <text x="193" y="3" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Voice</text>
    </g>
  </g>

  <!-- ====== FLOATING CHANNEL PILLS (bottom) ====== -->
  <g transform="translate(30, 558)">
    <rect width="100" height="32" rx="16" fill="#25D366" opacity="0.08" stroke="#25D366" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="18" cy="16" r="6" fill="#25D366"/>
    <text x="30" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#25D366">WhatsApp</text>
  </g>
  <g transform="translate(142, 558)">
    <rect width="70" height="32" rx="16" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="18" cy="16" r="6" fill="#4A90D9"/>
    <text x="30" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#4A90D9">SMS</text>
  </g>
  <g transform="translate(224, 558)">
    <rect width="70" height="32" rx="16" fill="#A855F7" opacity="0.08" stroke="#A855F7" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="18" cy="16" r="6" fill="#A855F7"/>
    <text x="30" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#A855F7">Chat</text>
  </g>
  <g transform="translate(306, 558)">
    <rect width="70" height="32" rx="16" fill="#14B8A6" opacity="0.08" stroke="#14B8A6" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="18" cy="16" r="6" fill="#14B8A6"/>
    <text x="30" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#14B8A6">Email</text>
  </g>
  <g transform="translate(388, 558)">
    <rect width="74" height="32" rx="16" fill="#EF4444" opacity="0.08" stroke="#EF4444" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="18" cy="16" r="6" fill="#EF4444"/>
    <text x="30" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#EF4444">Voice</text>
  </g>
</svg>