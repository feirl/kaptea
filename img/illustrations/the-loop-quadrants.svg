<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-label="The Loop: four quadrants of the Kaptea trust methodology">
  <title>The Loop — Kaptea's four-quadrant trust methodology</title>

  <!-- Background -->
  <rect width="720" height="440" fill="#131521" rx="12"/>

  <!-- Quadrant boxes -->
  <!-- Q1: LISTENING (top-left) -->
  <rect x="24" y="24" width="316" height="188" fill="#1a1f33" rx="8"/>
  <!-- Q2: CO-DESIGN (top-right) -->
  <rect x="380" y="24" width="316" height="188" fill="#1a1f33" rx="8"/>
  <!-- Q3: GETTING IT DONE (bottom-right) -->
  <rect x="380" y="236" width="316" height="180" fill="#1a1f33" rx="8"/>
  <!-- Q4: ENSURING SATISFACTION (bottom-left) -->
  <rect x="24" y="236" width="316" height="180" fill="#1a1f33" rx="8"/>

  <!-- ── ARROW: Q1 → Q2 (right, top gap) ── -->
  <line x1="345" y1="118" x2="374" y2="118" stroke="#dc2727" stroke-width="2"/>
  <polygon points="380,118 371,113 371,123" fill="#dc2727"/>

  <!-- ── ARROW: Q2 → Q3 (down, right gap) ── -->
  <line x1="538" y1="217" x2="538" y2="229" stroke="#dc2727" stroke-width="2"/>
  <polygon points="538,236 533,227 543,227" fill="#dc2727"/>

  <!-- ── ARROW: Q3 → Q4 (left, bottom gap) ── -->
  <line x1="375" y1="326" x2="346" y2="326" stroke="#dc2727" stroke-width="2"/>
  <polygon points="340,326 349,321 349,331" fill="#dc2727"/>

  <!-- ── ARROW: Q4 → Q1 (up, left gap) ── -->
  <line x1="182" y1="231" x2="182" y2="219" stroke="#dc2727" stroke-width="2"/>
  <polygon points="182,212 177,221 187,221" fill="#dc2727"/>

  <!-- ── Q1: LISTENING ── -->
  <text x="44" y="62" font-family="Manrope, sans-serif" font-size="10" font-weight="800" fill="#dc2727" letter-spacing="2">01</text>
  <text x="44" y="86" font-family="Manrope, sans-serif" font-size="16" font-weight="800" fill="#ffffff" letter-spacing="0.5">LISTENING</text>
  <text x="44" y="108" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="1">Request</text>
  <text x="44" y="136" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.75)" dy="0">
    <tspan x="44" dy="0">We receive the customer's request</tspan>
    <tspan x="44" dy="18">fully: the words, the context, the</tspan>
    <tspan x="44" dy="18">concern behind them.</tspan>
  </text>

  <!-- ── Q2: CO-DESIGN ── -->
  <text x="400" y="62" font-family="Manrope, sans-serif" font-size="10" font-weight="800" fill="#dc2727" letter-spacing="2">02</text>
  <text x="400" y="86" font-family="Manrope, sans-serif" font-size="16" font-weight="800" fill="#ffffff" letter-spacing="0.5">CO-DESIGN</text>
  <text x="400" y="108" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="1">Promise</text>
  <text x="400" y="136" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.75)">
    <tspan x="400" dy="0">We shape a commitment grounded</tspan>
    <tspan x="400" dy="18">in what is actually deliverable for</tspan>
    <tspan x="400" dy="18">this customer, right now.</tspan>
  </text>

  <!-- ── Q3: GETTING IT DONE ── -->
  <text x="400" y="274" font-family="Manrope, sans-serif" font-size="10" font-weight="800" fill="#dc2727" letter-spacing="2">03</text>
  <text x="400" y="298" font-family="Manrope, sans-serif" font-size="16" font-weight="800" fill="#ffffff" letter-spacing="0.5">GETTING IT DONE</text>
  <text x="400" y="318" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="1">Performance</text>
  <text x="400" y="344" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.75)">
    <tspan x="400" dy="0">The promise is executed. Handoffs</tspan>
    <tspan x="400" dy="18">happen with full shared context.</tspan>
    <tspan x="400" dy="18">The commitment stays live.</tspan>
  </text>

  <!-- ── Q4: ENSURING SATISFACTION ── -->
  <text x="44" y="274" font-family="Manrope, sans-serif" font-size="10" font-weight="800" fill="#dc2727" letter-spacing="2">04</text>
  <text x="44" y="298" font-family="Manrope, sans-serif" font-size="16" font-weight="800" fill="#ffffff" letter-spacing="0.5">ENSURING SATISFACTION</text>
  <text x="44" y="318" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="1">Completion</text>
  <text x="44" y="344" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.75)">
    <tspan x="44" dy="0">The loop closes. Did we fulfil what</tspan>
    <tspan x="44" dy="18">we agreed? Outcomes are written</tspan>
    <tspan x="44" dy="18">back. The next interaction begins better.</tspan>
  </text>

  <!-- ── Centre label ── -->
  <text x="360" y="222" font-family="Manrope, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">THE LOOP</text>

</svg>
