    <g fill="#fff" fill-opacity="0.35"><rect x="30" y="102" width="16" height="2" rx="1"/><rect x="30" y="106" width="10" height="2" rx="1"/><rect x="30" y="110" width="16" height="2" rx="1"/></g>
    <rect x="20" y="122" width="2.5" height="20" rx="1.2" fill="#dc2727"/>

    <text x="72" y="82" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#0F172A">Add New Template</text>
    <text x="72" y="96" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Templates / Create New</text>
    <text x="72" y="122" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#0F172A">Template Details</text>
    <text x="72" y="142" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Contact type *</text>
    <rect x="72" y="148" width="200" height="28" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
    <text x="86" y="166" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Please select contact type</text>
    <text x="288" y="142" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Template Name *</text>
    <rect x="288" y="148" width="220" height="28" rx="6" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
    <text x="302" y="166" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Enter Template Name</text>
    <line x1="72" y1="192" x2="520" y2="192" stroke="#E2E8F0" stroke-width="1"/>
    <text x="72" y="212" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#0F172A">Template Content</text>
    <text x="72" y="236" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">SMS Body Text *</text>
    <rect x="72" y="244" width="436" height="140" rx="8" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="86" y="266" font-family="Arial, sans-serif" font-size="10" fill="#334155">Thanks for your order! Order</text>
    <text x="86" y="282" font-family="Arial, sans-serif" font-size="10" fill="#334155">#</text>
    <rect x="94" y="272" width="68" height="14" rx="3" fill="#dc2727" opacity="0.08"/>
    <text x="98" y="283" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#dc2727">{{order_id}}</text>
    <text x="166" y="282" font-family="Arial, sans-serif" font-size="10" fill="#334155"> with</text>
    <rect x="86" y="290" width="62" height="14" rx="3" fill="#dc2727" opacity="0.08"/>
    <text x="90" y="301" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#dc2727">{{division}}</text>
    <text x="152" y="300" font-family="Arial, sans-serif" font-size="10" fill="#334155"> is confirmed.</text>
    <text x="86" y="318" font-family="Arial, sans-serif" font-size="10" fill="#334155">We'll text you when it ships.</text>
    <rect x="460" y="248" width="36" height="16" rx="8" fill="#7C4DFF" opacity="0.08"/>
    <text x="478" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#7C4DFF">AI</text>
    <text x="72" y="402" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Characters: 118 (GSM-7)</text>
    <text x="260" y="402" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">Segments: 1</text>
    <rect x="72" y="416" width="100" height="30" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
    <text x="122" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748B">Cancel</text>
    <rect x="186" y="416" width="130" height="30" rx="8" fill="#dc2727"/>
    <text x="251" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#fff">Create Template</text>
    <!-- Phone preview -->
    <rect x="556" y="72" width="248" height="440" rx="10" fill="#FAFBFC" filter="url(#card-shadow-sm)" stroke="#E2E8F0" stroke-width="1"/>
    <text x="572" y="94" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#0F172A">Message Preview</text>
    <text x="572" y="108" font-family="Arial, sans-serif" font-size="9" fill="#94A3B8">See how your template will appear</text>
    <rect x="624" y="124" width="150" height="300" rx="20" fill="#131521"/>
    <rect x="630" y="138" width="138" height="270" rx="2" fill="#ECE5DD"/>
    <rect x="630" y="138" width="138" height="36" rx="2" fill="#075E54"/>
    <circle cx="646" y="156" r="8" fill="#fff" fill-opacity="0.2"/>
    <text x="660" y="160" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#fff">SMS Preview</text>
    <text x="660" y="170" font-family="Arial, sans-serif" font-size="7" fill="#fff" fill-opacity="0.7">Template Message</text>
    <rect x="638" y="182" width="120" height="100" rx="8" fill="#fff"/>
    <text x="646" y="196" font-family="Arial, sans-serif" font-size="7.5" fill="#333">Thanks for your order!</text>
    <text x="646" y="208" font-family="Arial, sans-serif" font-size="7.5" fill="#333">Order #{{order_id}} with</text>
    <text x="646" y="220" font-family="Arial, sans-serif" font-size="7.5" fill="#333">{{division}} is confirmed.</text>
    <text x="646" y="236" font-family="Arial, sans-serif" font-size="7.5" fill="#333">We'll text you when</text>
    <text x="646" y="248" font-family="Arial, sans-serif" font-size="7.5" fill="#333">it ships.</text>
    <text x="724" y="276" font-family="Arial, sans-serif" font-size="6" fill="#999">09:41</text>
    <!-- Tips -->
    <rect x="556" y="434" width="248" height="78" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
    <text x="572" y="452" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#B45309">Template Tips</text>
    <text x="572" y="468" font-family="Arial, sans-serif" font-size="8" fill="#78716C">Use variables like {{name}} for personalization</text>
    <text x="572" y="482" font-family="Arial, sans-serif" font-size="8" fill="#78716C">Keep SMS under 160 characters for single segment</text>
    <text x="572" y="496" font-family="Arial, sans-serif" font-size="8" fill="#78716C">Include clear call-to-action in your message</text>

  </g>
</svg>