    <text x="140" y="45" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">app.kaptea.com/pronto/templates/sms/create</text>
    <circle cx="740" cy="41" r="3" fill="#CBD5E1"/><circle cx="760" cy="41" r="3" fill="#CBD5E1"/><circle cx="780" cy="41" r="3" fill="#CBD5E1"/>
  </g>
